name: verify
on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - labeled
      - unlabeled
      - reopened
      - ready_for_review
env: {}
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    name: verify (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Run make
        run: make
      - name: Run verify
        run: make verify
